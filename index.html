<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Profil — Live Stream Widget</title>
<style>
  body{font-family:system-ui,Arial;margin:0;background:#f6f8fb;color:#222}
  header{background:#0b3d91;color:#fff;padding:20px;position:relative}
  .container{max-width:980px;margin:0 auto;padding:16px}
  .video-widget{position:absolute;top:12px;right:12px;width:340px;border-radius:10px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.18);background:#fff}
  .video-header{padding:8px 12px;background:rgba(11,61,145,.06);display:flex;justify-content:space-between;align-items:center}
  .video-body{background:#000}
  video, iframe, .mjpeg-img{width:100%;height:190px;display:block;object-fit:cover;background:#000}
  .controls{display:flex;gap:8px;padding:8px}
  .controls button{padding:6px 8px;border-radius:6px;border:0;background:#2b6cb0;color:#fff;cursor:pointer}
  .controls .secondary{background:#fff;color:#2b6cb0;border:1px solid rgba(43,108,176,.12)}
  .status{margin-left:auto;color:#666;font-size:.9rem;align-self:center}
  @media(max-width:720px){.video-widget{position:static;margin:12px}}
</style>
</head>
<body>
<header>
  <div class="container">
    <h1>Desmon Donald Siagian</h1>
    <p style="color:#e6eefc">Profil & Live Stream</p>
  </div>

  <div class="video-widget" id="videoWidget" aria-live="polite">
    <div class="video-header">
      <div style="font-weight:700;color:#0b3d91">Live Stream</div>
      <div style="font-size:.9rem;color:#666">Kamera Profil</div>
    </div>
    <div class="video-body" id="videoBody">
      <!-- video tag untuk HLS/MP4 -->
      <video id="liveVideo" playsinline controls muted></video>
      <!-- fallback MJPEG (disembunyikan awalnya) -->
      <img id="mjpegImg" class="mjpeg-img" style="display:none" alt="MJPEG stream">
      <!-- iframe fallback -->
      <iframe id="iframeFallback" style="display:none;border:0" title="stream fallback"></iframe>
    </div>
    <div class="controls">
      <button id="btnPlayPause">Pause</button>
      <button id="btnMute" class="secondary">Unmute</button>
      <button id="btnSnapshot" class="secondary">Ambil Snapshot</button>
      <button id="btnFullscreen" class="secondary">Fullscreen</button>
      <div class="status" id="streamStatus">Memuat…</div>
    </div>
  </div>
</header>

<main class="container" style="padding-top:120px">
  <section style="background:#fff;padding:16px;border-radius:8px;box-shadow:0 1px 6px rgba(0,0,0,.04)">
    <h2>Profil Singkat</h2>
    <p>Desmon Donald Siagian — Guru Fisika, Bandung</p>
  </section>
</main>

<!-- hls.js CDN (untuk HLS playback di browser yang tidak native) -->
<script src="https://cdn.jsdelivr.net/npm/hls.js@1.4.0/dist/hls.min.js"></script>
<script>
/* Ubah VIDEO_SRC sesuai protokol/path server Anda.
   Contoh:
   - HLS: 'http://10.101.209.98:8080/stream.m3u8'
   - MJPEG: 'http://10.101.209.98:8080/?action=stream'
   - MP4: 'http://10.101.209.98/video.mp4'
   - RTSP: tidak langsung diputar di browser (butuh ffmpeg gateway)
*/
const VIDEO_SRC = 'http://10.101.209.98'; // ganti jika perlu

const video = document.getElementById('liveVideo');
const mjpegImg = document.getElementById('mjpegImg');
const iframe = document.getElementById('iframeFallback');
const status = document.getElementById('streamStatus');
const btnPlayPause = document.getElementById('btnPlayPause');
const btnMute = document.getElementById('btnMute');
const btnSnapshot = document.getElementById('btnSnapshot');
const btnFullscreen = document.getElementById('btnFullscreen');

function setStatus(t){ status.textContent = t; }

/* Coba deteksi HLS (.m3u8) */
function tryHLS(src){
  if(!src) return false;
  if(src.endsWith('.m3u8') || src.includes('.m3u8')){
    if(Hls.isSupported()){
      const hls = new Hls();
      hls.loadSource(src);
      hls.attachMedia(video);
      hls.on(Hls.Events.MANIFEST_PARSED, ()=> { video.play().catch(()=>{}); setStatus('Live (HLS)'); });
      hls.on(Hls.Events.ERROR, (e,d)=> console.warn('hls error',e,d));
    } else if(video.canPlayType('application/vnd.apple.mpegurl')){
      video.src = src;
      video.addEventListener('loadedmetadata', ()=> video.play().catch(()=>{}));
      setStatus('Live (HLS native)');
    }
    return true;
  }
  return false;
}

/* Coba MP4/HTTP progressive */
function tryMP4(src){
  if(!src) return false;
  if(src.endsWith('.mp4') || src.includes('.mp4')){
    video.src = src;
    video.addEventListener('loadeddata', ()=> { video.play().catch(()=>{}); setStatus('Live (MP4)'); });
    video.addEventListener('error', ()=> setStatus('MP4 tidak dapat diputar'));
    return true;
  }
  return false;
}

/* Coba MJPEG */
function tryMJPEG(src){
  if(!src) return false;
  // heuristik: banyak MJPEG endpoint mengandung 'stream' atau 'action=stream'
  if(src.includes('mjpeg') || src.includes('stream') || src.includes('action=stream')){
    mjpegImg.src = src;
    mjpegImg.style.display = 'block';
    video.style.display = 'none';
    iframe.style.display = 'none';
    setStatus('Live (MJPEG)');
    return true;
  }
  return false;
}

/* Fallback iframe */
function tryIframe(src){
  iframe.src = src;
  iframe.style.display = 'block';
  video.style.display = 'none';
  mjpegImg.style.display = 'none';
  setStatus('Fallback iframe (cek path)');
}

/* Inisialisasi: coba beberapa pola umum */
(function init(){
  // Coba beberapa kemungkinan path umum
  const candidates = [
    VIDEO_SRC,
    VIDEO_SRC + '/stream.m3u8',
    VIDEO_SRC + '/hls/stream.m3u8',
    VIDEO_SRC + '/video.mp4',
    VIDEO_SRC + ':8080/?action=stream',
    VIDEO_SRC + ':8080/stream',
    VIDEO_SRC + ':8000/stream.m3u8'
  ];
  let used=false;
  for(const c of candidates){
    if(tryHLS(c) || tryMP4(c) || tryMJPEG(c)){ used=true; break; }
  }
  if(!used){
    // tampilkan iframe fallback ke alamat dasar
    tryIframe(VIDEO_SRC);
    setStatus('Coba fallback; periksa protokol/path dan jaringan');
  }
})();

/* Kontrol */
btnPlayPause.addEventListener('click', ()=>{
  if(video.paused){ video.play().catch(()=>{}); btnPlayPause.textContent='Pause'; }
  else { video.pause(); btnPlayPause.textContent='Play'; }
});
btnMute.addEventListener('click', ()=>{ video.muted = !video.muted; btnMute.textContent = video.muted ? 'Unmute' : 'Mute'; });

btnSnapshot.addEventListener('click', ()=>{
  try {
    const w = video.videoWidth || 640;
    const h = video.videoHeight || 360;
    const canvas = document.createElement('canvas');
    canvas.width = w; canvas.height = h;
    canvas.getContext('2d').drawImage(video,0,0,w,h);
    const data = canvas.toDataURL('image/png');
    const win = window.open();
    win.document.write('<img src="'+data+'" style="max-width:100%"/>');
    setStatus('Snapshot diambil');
  } catch(e){
    setStatus('Snapshot gagal (CORS atau stream tidak mendukung)');
  }
});

btnFullscreen.addEventListener('click', async ()=>{
  const el = document.getElementById('videoWidget');
  if(!document.fullscreenElement) await el.requestFullscreen().catch(()=>setStatus('Fullscreen tidak tersedia'));
  else document.exitFullscreen();
});
</script>
</body>
</html>
